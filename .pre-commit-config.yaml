repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        pass_filenames: false
        args: ["src", "tests", "--ignore-words-list=ne,falkordb"]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package.lock.json

  - repo: local
    hooks:
      - id: inject-handoff-hash
        name: Inject HEAD hash into PR handoff docs
        entry: python scripts/hooks/inject_handoff_hash.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
      - id: branch-write-guard
        name: Deny write access to denied paths on issue branches (per process/issues/N_HARNESS.toml)
        entry: python scripts/hooks/branch_write_guard.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
      - id: verify-handoff-completeness
        name: Verify handoff PR documents have complete checklist evidence
        entry: python scripts/hooks/verify_handoff_completeness.py
        language: system
        files: ^process/PR_.*_HANDOFF\.md$
        stages: [pre-commit]

      - id: architect-branch-guard
        name: Refuse architect-owned file commits on non-master branches
        entry: python scripts/hooks/architect_branch_guard.py
        language: system
        pass_filenames: true
        stages: [pre-commit]
