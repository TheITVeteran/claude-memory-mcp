# Per-issue write-guard config for the issue-22/* branch family
# Read by scripts/hooks/branch_write_guard.py
#
# Issue #22 is the architectural intervention replacing the per-test
# whack-a-mole of issue #14: build a mock_factory helper, migrate test files
# to use it, add scanner Pattern 12 to detect remaining hand-rolled patterns.
# Per process/issues/22a_BUILD_SPEC.md and follow-on 22b-22f specs.

[issue-22]
denied_paths = [
    # Block all the conftest paths the issue #14 sneak-arounds touched
    "tests/unit/conftest.py",
    "tests/conftest.py",
    "tests/integration/conftest.py",
    "pytest.ini",
    # Block production source for test-only PRs in this family
    "src/claude_memory",
    # Block ALL spec files — Builder must not modify Architect-protected specs.
    # Discovered in 22a round-1 audit (2026-05-28): AG's branch had the audit spec
    # regressed to a stale version. Architect specs are the auditor's source of
    # truth; Builder writing them is a structural conflict of interest.
    "process/issues/22a_BUILD_SPEC.md",
    "process/issues/22a_AUDIT_SPEC.md",
    "process/issues/22b_BUILD_SPEC.md",
    "process/issues/22b_AUDIT_SPEC.md",
    "process/issues/22c_BUILD_SPEC.md",
    "process/issues/22c_AUDIT_SPEC.md",
    "process/issues/22d_BUILD_SPEC.md",
    "process/issues/22d_AUDIT_SPEC.md",
    "process/issues/22e_BUILD_SPEC.md",
    "process/issues/22e_AUDIT_SPEC.md",
    "process/issues/22f_BUILD_SPEC.md",
    "process/issues/22f_AUDIT_SPEC.md",
    "process/issues/22_HARNESS.toml",
    "process/REMEDIATION_BUILD_SPEC.md",
    "process/REMEDIATION_AUDIT_SPEC.md",
]
rationale = "Issue #22 family is test-only refactoring (mock factory helper + per-file migrations). Modifying conftest.py risks the suppression-fixture sneak-around from issue #14 redux. Modifying src/claude_memory is scope creep. Modifying *_BUILD_SPEC.md or *_AUDIT_SPEC.md is a structural conflict of interest — Builder cannot self-modify the criteria they're being audited against, nor regress them to easier versions. If a spec has an error that surfaces during execution, escalate to architect per Round 5 discipline; do NOT silently patch it. The architect updates spec docs on master; AG rebases to pick them up."
